<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050C18"/>
      <stop offset="50%" stop-color="#091524"/>
      <stop offset="100%" stop-color="#050C18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1A3A5C" stroke-width="1" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Cyan glow blob behind title -->
  <ellipse cx="600" cy="240" rx="340" ry="120" fill="#00D4FF" opacity="0.06" filter="url(#blur)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="3" fill="#00D4FF" opacity="0.6"/>
  <!-- Bottom border line -->
  <rect x="0" y="627" width="1200" height="3" fill="#00D4FF" opacity="0.6"/>

  <!-- Corner accents -->
  <g stroke="#00D4FF" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="40,40 40,70 70,70"/>
    <polyline points="1160,40 1160,70 1130,70"/>
    <polyline points="40,590 40,560 70,560"/>
    <polyline points="1160,590 1160,560 1130,560"/>
  </g>

  <!-- Diamond eyemark -->
  <text x="600" y="170" text-anchor="middle" font-family="monospace" font-size="28" fill="#00D4FF" opacity="0.7">◈</text>

  <!-- BATTLESHIP title -->
  <text x="600" y="285"
    text-anchor="middle"
    font-family="monospace,Courier New,monospace"
    font-size="108"
    font-weight="900"
    letter-spacing="12"
    fill="#00D4FF"
    filter="url(#textglow)"
    opacity="0.95">BATTLESHIP</text>

  <!-- Subtitle -->
  <text x="600" y="340"
    text-anchor="middle"
    font-family="monospace,Courier New,monospace"
    font-size="18"
    letter-spacing="6"
    fill="#7AACCC"
    opacity="0.85">[ NAVAL COMMAND SYSTEM ]</text>

  <!-- Divider line -->
  <line x1="420" y1="370" x2="780" y2="370" stroke="#1A3A5C" stroke-width="1"/>

  <!-- Feature pills row -->
  <g font-family="monospace,Courier New,monospace" font-size="14" letter-spacing="2">
    <!-- 5 SUPER WEAPONS -->
    <rect x="140" y="390" width="220" height="36" rx="4" fill="#0F1E35" stroke="#1A3A5C" stroke-width="1"/>
    <text x="250" y="413" text-anchor="middle" fill="#00D4FF" opacity="0.8">5 SUPER WEAPONS</text>

    <!-- 15 MEDALS -->
    <rect x="380" y="390" width="160" height="36" rx="4" fill="#0F1E35" stroke="#1A3A5C" stroke-width="1"/>
    <text x="460" y="413" text-anchor="middle" fill="#FFD700" opacity="0.85">15 MEDALS</text>

    <!-- 8 RANKS -->
    <rect x="560" y="390" width="130" height="36" rx="4" fill="#0F1E35" stroke="#1A3A5C" stroke-width="1"/>
    <text x="625" y="413" text-anchor="middle" fill="#FFAB00" opacity="0.85">8 RANKS</text>

    <!-- OFFLINE -->
    <rect x="710" y="390" width="130" height="36" rx="4" fill="#0F1E35" stroke="#1A3A5C" stroke-width="1"/>
    <text x="775" y="413" text-anchor="middle" fill="#00E676" opacity="0.8">OFFLINE</text>

    <!-- FREE -->
    <rect x="860" y="390" width="200" height="36" rx="4" fill="#0F1E35" stroke="#1A3A5C" stroke-width="1"/>
    <text x="960" y="413" text-anchor="middle" fill="#7AACCC" opacity="0.8">FREE · OPEN SOURCE</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="500"
    text-anchor="middle"
    font-family="monospace,Courier New,monospace"
    font-size="16"
    letter-spacing="3"
    fill="#00E676"
    opacity="0.7">SINK THE ENEMY FLEET — EARN YOUR RANK — LEAVE NO SHIP STANDING</text>

  <!-- Android badge -->
  <text x="600" y="555"
    text-anchor="middle"
    font-family="monospace,Courier New,monospace"
    font-size="13"
    letter-spacing="2"
    fill="#2A4D6E">FREE ANDROID APP  ·  NO ADS  ·  NO ACCOUNT  ·  NO NETWORK</text>
</svg>
